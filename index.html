const RR = (function(){
  const { useState, useEffect, useContext, createContext, createElement: h, Children } = React;
  const ParamsCtx = createContext({});
  function getPath(){ const hash = window.location.hash || '#/'; return hash.replace(/^#/, '') || '/'; }
  function useHashPath(){
    const [p, setP] = useState(getPath());
    useEffect(()=>{ const on=()=>setP(getPath()); window.addEventListener('hashchange', on); return ()=>window.removeEventListener('hashchange', on); },[]);
    return p;
  }
  function navigate(to){ if(typeof to==='number'){ history.go(to); return; } window.location.hash = '#'+to; window.scrollTo(0,0); }
  function useNavigate(){ return navigate; }
  function useLocation(){ return { pathname: useHashPath() }; }
  function useParams(){ return useContext(ParamsCtx); }
  const Link = React.forwardRef(function Link({to, className, children, ...rest}, ref){ return h('a', { href:'#'+to, className, ref, ...rest }, children); });
  const NavLink = React.forwardRef(function NavLink({to, end, className, children, ...rest}, ref){
    const path = useHashPath();
    const active = end ? path===to : (path===to || path.startsWith(to.replace(/\/$/,'')+'/'));
    let cn = typeof className==='function' ? className({isActive:active}) : className;
    if(active) cn = (cn?cn+' ':'')+'active';
    return h('a', { href:'#'+to, className:cn, ref, ...rest }, children);
  });
  function matchRoute(pattern, path){
    if(pattern==='*') return null;
    if(pattern==='/') return path==='/'?{}:null;
    const pp = pattern.split('/').filter(Boolean);
    const ap = path.split('/').filter(Boolean);
    if(pp.length!==ap.length) return null;
    const params={};
    for(let i=0;i<pp.length;i++){ if(pp[i][0]===':') params[pp[i].slice(1)]=decodeURIComponent(ap[i]); else if(pp[i]!==ap[i]) return null; }
    return params;
  }
  function Routes({children}){
    const path = useHashPath();
    const arr = Children.toArray(children);
    let star=null;
    for(const ch of arr){
      const pat = ch.props.path;
      if(pat==='*'){ star=ch; continue; }
      const m = matchRoute(pat, path);
      if(m){ return h(ParamsCtx.Provider,{value:m}, ch.props.element); }
    }
    return star ? h(ParamsCtx.Provider,{value:{}}, star.props.element) : null;
  }
  function Route(){ return null; }
  function HashRouter({children}){ return children; }
  return { Link, NavLink, Routes, Route, HashRouter, useLocation, useParams, useNavigate };
})();

/* ===== src/components/Reveal.jsx ===== */
const M_Reveal = (function(){
const { useEffect, useRef, useState } = React;

/** Reveal — fade/slide content in on scroll, with failsafes so nothing ever stays hidden. */
function Reveal({ children, delay = 0, as: Tag = 'div', className = '', style, ...rest }) {
  const ref = useRef(null);
  const [shown, setShown] = useState(() => {
    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    return reduce || !('IntersectionObserver' in window);
  });
  useEffect(() => {
    const el = ref.current;
    if (!el || shown) return;
    const reveal = () => setShown(true);
    const io = new IntersectionObserver(
      (entries) => entries.forEach((en) => { if (en.isIntersecting) { reveal(); io.unobserve(en.target); } }),
      { threshold: 0.1, rootMargin: '0px 0px -8% 0px' }
    );
    io.observe(el);
    const r = el.getBoundingClientRect();
    const raf = (r.top < window.innerHeight && r.bottom > 0) ? requestAnimationFrame(reveal) : 0;
    const t = setTimeout(reveal, 1200);
    return () => { io.disconnect(); clearTimeout(t); if (raf) cancelAnimationFrame(raf); };
  }, [shown]);
  return (
    <Tag ref={ref} className={`reveal ${shown ? 'in' : ''} ${className}`.trim()}
      style={{ ...style, ...(delay && shown ? { transitionDelay: `${delay}ms` } : null) }} {...rest}>
      {children}
    </Tag>
  );
}

return { default: Reveal };
})();

/* ===== src/components/ImageSlot.jsx ===== */
const M_ImageSlot = (function(){
const { useEffect, useRef, useState } = React;
/* ---------- ImageSlot (click/drag to fill, parallax option) ---------- */
const MAX_DIM = 1400;
const ACCEPT = ['image/png', 'image/jpeg', 'image/webp', 'image/avif'];
const SLOT_KEY = (id) => `anchor.ed.imageslot.${id}`;
async function toDataUrl(file, targetW) {
  const bitmap = await createImageBitmap(file);
  try {
    const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);
    const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));
    const w = Math.max(1, Math.round(bitmap.width * scale));
    const h = Math.max(1, Math.round(bitmap.height * scale));
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
    return canvas.toDataURL('image/webp', 0.85);
  } finally { bitmap.close && bitmap.close(); }
}
const PhIcon = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" /><circle cx="8.5" cy="8.5" r="1.5" /><polyline points="21 15 16 10 5 21" /></svg>);
const ClearIcon = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>);
function ImageSlot({ id, className = '', placeholder = 'Drop an image', src = '' }) {
  const [url, setUrl] = useState(null);
  const [err, setErr] = useState('');
  const elRef = useRef(null);
  const inputRef = useRef(null);
  useEffect(() => {
    try {
      const stored = localStorage.getItem(SLOT_KEY(id));
      // eslint-disable-next-line react-hooks/set-state-in-effect -- intentional: hydrate from storage
      if (stored && /^data:image\//i.test(stored)) setUrl(stored);
    } catch { /* storage unavailable */ }
  }, [id]);
  async function ingest(file) {
    if (!file) return;
    if (!ACCEPT.includes(file.type)) { flash('Use a PNG, JPG or WebP image.'); return; }
    try {
      const w = elRef.current?.clientWidth || MAX_DIM;
      const dataUrl = await toDataUrl(file, w);
      setUrl(dataUrl);
      try { localStorage.setItem(SLOT_KEY(id), dataUrl); } catch { /* ignore */ }
    } catch { flash('Could not read that image.'); }
  }
  function flash(msg) { setErr(msg); setTimeout(() => setErr(''), 3000); }
  function clearOrReplace(e) {
    e.stopPropagation();
    if (url) { setUrl(null); try { localStorage.removeItem(SLOT_KEY(id)); } catch { /* ignore */ } }
    else inputRef.current?.click();
  }
  const shown = url || src;
  return (
    <div ref={elRef} className={`img-slot ${className}`.trim()}
      onDragOver={(e) => e.preventDefault()}
      onDrop={(e) => { e.preventDefault(); ingest(e.dataTransfer.files?.[0]); }}>
      {shown ? (
        <>
          <img src={shown} alt="" loading="lazy" />
          <button className="clear" onClick={clearOrReplace} aria-label={url ? 'Remove image' : 'Replace image'}>{url ? <ClearIcon /> : <PhIcon />}</button>
        </>
      ) : (
        <div className="ph" onClick={() => inputRef.current?.click()}>
          <PhIcon />
          <span>{err || placeholder}</span>
        </div>
      )}
      <input ref={inputRef} type="file" accept={ACCEPT.join(',')} style={{ display: 'none' }} onChange={(e) => ingest(e.target.files?.[0])} />
    </div>
  );
}


return { default: ImageSlot };
})();

const M_Marquee = (function(){
function renderItems(items) {
  return items.map((item, i) =>
    typeof item === 'string' ? (

const M_Header = (function(){
const { useEffect, useState } = React; const { NavLink, useLocation } = RR; const { Anchor, Phone, Menu, X } = M_icons; const { PHONE, PHONE_DISPLAY } = M_data;

function Header() {
  const [open, setOpen] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const { pathname } = useLocation();

  useEffect(() => {
    // eslint-disable-next-line react-hooks/set-state-in-effect -- intentional: sync menu to route
    setOpen(false);
  }, [pathname]);

  useEffect(() => {
    document.body.style.overflow = open ? 'hidden' : '';
    return () => {
      document.body.style.overflow = '';
    };
  }, [open]);

  useEffect(() => {
    const id = requestAnimationFrame(() => setLoaded(true));
    return () => cancelAnimationFrame(id);
  }, []);

  useEffect(() => {
    let resizeTimer;
    const onResize = () => {
      document.body.classList.add('is-resizing');
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        document.body.classList.remove('is-resizing');
      }, 200);
    };
    window.addEventListener('resize', onResize);
    return () => {
      window.removeEventListener('resize', onResize);
      clearTimeout(resizeTimer);
      document.body.classList.remove('is-resizing');
    };
  }, []);

  return (
    <header className={`site-header ${loaded ? 'is-loaded' : ''}`}>
      <div className="wrap nav">
        <NavLink
          className="brand"
          to="/"
          aria-label="Anchor Tech Solutions home"

const M_Contact = (function(){
const { useRef, useState } = React; const { Link } = RR; const Reveal = M_Reveal.default; const { Eyebrow } = M_SectionHead; const { Chevron } = M_icons; const { AD } = M_data;



/* ---------------- Contact ---------------- */
const serviceOptions = ['Network Setup', 'Wi-Fi Installation', 'Hardware Purchasing Advice', 'Security Cameras', 'POS Systems', 'Data Backup & Recovery', 'Cybersecurity & Protection', 'Ongoing Tech Support', 'Something else'];
const coverageAreas = ['Ventura', 'Oxnard', 'Camarillo', 'Thousand Oaks', 'Ojai', 'Santa Barbara', 'Santa Paula'];
const heroFacts = [
  ['01', 'One business day', 'Typical reply time — usually a lot sooner'],
  ['02', 'Free consultation', 'We learn your business first, no obligation'],
  ['03', '24/7 for clients', 'Around-the-clock support when it counts'],
];

function ContactForm() {
  const [sent, setSent] = useState(false);
  const [sending, setSending] = useState(false);
  const [service, setService] = useState('');
  const formRef = useRef(null);
  function handleSubmit(e) {
    e.preventDefault();
    const form = formRef.current;
    if (!form.checkValidity()) { form.reportValidity(); return; }
    setSending(true);
    const top = form.getBoundingClientRect().top + window.scrollY - 120;
    setTimeout(() => { setSending(false); setSent(true); window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' }); }, 900);
  }
  if (sent) {
    return (
      <div className="form-success">
        <h3>Thanks — message sent!</h3>
        <p>We’ve got your request and will be in touch within one business day. Need us sooner? Call <a href={`tel:${AD.PHONE}`} style={{ color: 'var(--accent)', fontWeight: 600 }}>{AD.PHONE_DISPLAY}</a>.</p>
      </div>
    );
  }
  return (
    <>
      <Eyebrow ix="01">Free consultation</Eyebrow>
      <h2 className="title" style={{ fontSize: 28 }}>Request your free consultation</h2>
      <p style={{ color: 'var(--muted)', margin: '10px 0 26px', fontSize: '15.5px' }}>
        Fill out the form and we’ll be in touch. Prefer to talk now? Call <a href={`tel:${AD.PHONE}`} style={{ color: 'var(--accent)', fontWeight: 600 }}>{AD.PHONE_DISPLAY}</a>.
      </p>
      <form ref={formRef} noValidate onSubmit={handleSubmit}>
        <div className="field-row">
          <div className="field-float"><input type="text" id="name" name="name" placeholder=" " required autoComplete="name" /><label htmlFor="name">Name</label></div>
          <div className="field-float"><input type="tel" id="phone" name="phone" placeholder=" " required autoComplete="tel" /><label htmlFor="phone">Phone</label></div>
        </div>
        <div className="field-float"><input type="email" id="email" name="email" placeholder=" " required autoComplete="email" /><label htmlFor="email">Email</label></div>
        <div className="field-float field-select">
          <select id="service" name="service" value={service} onChange={(e) => setService(e.target.value)} className={service ? 'filled' : ''}>
            <option value="" disabled hidden></option>
            {serviceOptions.map((o) => <option key={o}>{o}</option>)}
          </select>
          <label htmlFor="service">What can we help with? <span className="opt">(optional)</span></label>
        </div>
        <div className="field-float"><textarea id="message" name="message" placeholder=" " required rows={4} /><label htmlFor="message">A little about your business</label></div>
        <button type="submit" className={`btn btn--lg btn--block ${sending ? 'is-loading' : ''}`} disabled={sending}>{sending ? 'Sending…' : 'Send my request'}</button>
        <p className="form-note">We’ll never share your details. We typically reply within one business day.</p>
      </form>
    </>
  );
}

function Contact() {
  return (
    <>
      <section className="page-hero page-hero--split">
        <div className="wrap">
          <div className="hero-lead">
            <Reveal className="crumbs"><Link to="/">Home</Link><Chevron /><span>Contact</span></Reveal>
            <Reveal as="h1" delay={60}>Let’s talk about your tech.</Reveal>
            <Reveal as="p" delay={120}>Tell us what you need and we’ll get back to you within one business day — usually a lot sooner. Free consultations, honest advice, no pressure.</Reveal>
          </div>
          <Reveal className="hero-aside" delay={140}>
            <span className="hero-figure" aria-hidden="true">Hi</span>
            <div className="hero-rail">
              <div className="rail-head"><span className="rh-ix">—</span><span className="rh-label">What to expect</span></div>
              {heroFacts.map(([n, t, d]) => (
                <div className="hero-fact" key={n}>
                  <span className="hf-n">{n}</span>
                  <div><b>{t}</b><span>{d}</span></div>

              </div>
            </div>
          </Reveal>
        </div>
      </section>

      <section className="section">
        <div className="wrap contact-grid">
          <Reveal className="contact-card form-card"><ContactForm /></Reveal>

          <Reveal className="contact-card info-card" delay={80}>
            <Eyebrow ix="02">Direct lines</Eyebrow>
            <h3>Get in touch directly</h3>
            <p className="sub">We’re a quick call or email away.</p>
            <ul className="info-list">
              <li><div><div className="lbl">Call us</div><a href={`tel:${AD.PHONE}`}>{AD.PHONE_DISPLAY}</a></div></li>
              <li><div><div className="lbl">Email us</div><a href={`mailto:${AD.EMAIL}`}>{AD.EMAIL}</a></div></li>
              <li><div><div className="lbl">Service area</div><span className="val">Ventura County, CA<small>Ventura · Oxnard · Camarillo · Thousand Oaks · Ojai · Santa Barbara &amp; nearby</small></span></div></li>
            </ul>
            <div className="hours">
              <div className="hours-lbl">Hours</div>
              <div className="hours-row"><span>Monday – Friday</span><b>8:00 AM – 6:00 PM</b></div>

          </Reveal>

          <Reveal className="contact-card next-card" delay={120}>
            <Eyebrow ix="03">After you hit send</Eyebrow>
            <h3>What happens next</h3>
            <ol className="next-steps">
              <li><span className="ns-ix">01</span><div><b>We reply within one business day</b><span>Usually a lot sooner — often the same afternoon.</span></div></li>
              <li><span className="ns-ix">02</span><div><b>A quick, no-pressure chat</b><span>We learn your business and what’s actually slowing you down.</span></div></li>
              <li><span className="ns-ix">03</span><div><b>A clear, flat-rate quote</b><span>Plain-English plan and pricing — approved before any work begins.</span></div></li>
            </ol>
          </Reveal>

          <Reveal className="contact-card coverage-card" delay={160}>
            <Eyebrow ix="04">Coverage</Eyebrow>
            <h3>Right down the road</h3>
            <p className="cov-sub">On-site across Ventura County — usually same- or next-day.</p>
            <div className="chips">{coverageAreas.map((a) => <span className="chip" key={a}>{a}</span>)}</div>
          </Reveal>
        </div>
      </section>
    </>
  );
}

return { default: Contact };
})();

const M_ServiceDetail = (function(){

              <p>Clear documentation and a hands-on walkthrough for your team, so nothing about your setup stays a mystery after we leave.</p>

            <ul className="check-list" style={{ marginTop: 26 }}>
              {service.outcomes.map(([b, d]) => (<li key={b}><div><b>{b}</b><span className="d">{d}</span></div></li>))}
            </ul>
            <div style={{ marginTop: 32 }}><Link className="btn" to="/contact">Get a free quote <Arrow /></Link></div>

          </Reveal>
          <div className="signs-grid" style={{ marginTop: 48 }}>

                <span className="sign-n">{String(i + 1).padStart(2, '0')}</span><p>{sign}</p>
              </Reveal>

      <section className="section">

/* ===== App mount ===== */
function App(){
  const { useEffect } = React;
  const { Routes, Route, useLocation } = RR;
  const Header = M_Header.default, Footer = M_Footer.default;
  const Home=M_Home.default, Services=M_Services.default, ServiceDetail=M_ServiceDetail.default, About=M_About.default, Contact=M_Contact.default;
  function ScrollToTop(){ const {pathname}=useLocation(); useEffect(()=>{ window.scrollTo(0,0); },[pathname]); return null; }
  function NotFound(){ return (<section className="page-hero"><div className="wrap"><p className="eyebrow">404</p><h1>That page wandered off.</h1></div></section>); }
  return (<React.Fragment>
    <ScrollToTop/>
    <Header/>
    <main>
      <Routes>
        <Route path="/" element={<Home/>}/>
        <Route path="/services" element={<Services/>}/>
        <Route path="/services/:slug" element={<ServiceDetail/>}/>
        <Route path="/about" element={<About/>}/>
        <Route path="/contact" element={<Contact/>}/>
        <Route path="*" element={<NotFound/>}/>
      </Routes>
    </main>
    <Footer/>
  </React.Fragment>);
}
if(!window.location.hash) window.location.hash = '#/';
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
